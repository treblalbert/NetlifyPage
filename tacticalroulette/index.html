<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game Database</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #eee;
            margin: 0;
        }

        h1 {
            text-align: center;
            font-size: 2.2em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399, #f87171, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(167,139,250,0.4));
        }

        /* ── Form ─────────────────────────────────── */
        .form-container {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 24px 28px;
            border-radius: 16px;
            max-width: 620px;
            margin: 0 auto 36px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .form-container h3 {
            margin: 0 0 18px;
            font-size: 1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a78bfa;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px 14px;
            margin: 6px 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #eee;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35); }
        input:focus, select:focus, textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
        }

        select option { background: #1a1a2e; color: #eee; }

        textarea { resize: vertical; min-height: 80px; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        button {
            padding: 11px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.88; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-add {
            flex: 1;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }

        .btn-export {
            background: linear-gradient(135deg, #065f46, #34d399);
            color: white;
            box-shadow: 0 4px 15px rgba(52,211,153,0.3);
        }

        /* ── Dashboard ────────────────────────────── */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .column {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 14px;
            min-height: 220px;
            transition: background 0.25s, box-shadow 0.25s;
        }

        .column.drag-over {
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 2px #a78bfa;
        }

        .column h2 {
            text-align: center;
            margin: 0 0 14px;
            font-size: 1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #ddd;
        }

        .counter {
            font-size: 0.75em;
            background: rgba(255,255,255,0.15);
            padding: 2px 9px;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: 600;
        }

        /* ── Cards ───────────────────────────────── */
        .card-item {
            margin-bottom: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
            cursor: grab;
            user-select: none;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }

        .card-item:active { cursor: grabbing; }

        .card-item.dragging {
            opacity: 0.45;
            transform: scale(0.97);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* Type color schemes */
        .defensive {
            background: linear-gradient(135deg, #052e16, #14532d);
            border-left: 5px solid #4ade80;
            color: #bbf7d0;
        }
        .defensive .card-name { color: #86efac; }
        .defensive .card-desc { color: #a7f3d0; }

        .offensive {
            background: linear-gradient(135deg, #3b0a0a, #7f1d1d);
            border-left: 5px solid #f87171;
            color: #fecaca;
        }
        .offensive .card-name { color: #fca5a5; }
        .offensive .card-desc { color: #fecaca; }

        .other {
            background: linear-gradient(135deg, #0c1a3a, #1e3a5f);
            border-left: 5px solid #60a5fa;
            color: #bfdbfe;
        }
        .other .card-name { color: #93c5fd; }
        .other .card-desc { color: #bfdbfe; }

        .special {
            background: linear-gradient(135deg, #2d1a00, #6b3a00);
            border-left: 5px solid #fbbf24;
            color: #fde68a;
        }
        .special .card-name { color: #fcd34d; }
        .special .card-desc { color: #fde68a; }

        .card-name { font-weight: 700; font-size: 1.05em; display: block; margin-bottom: 4px; }
        .card-desc { font-size: 0.875em; opacity: 0.85; line-height: 1.4; }

        .card-badge {
            display: inline-block;
            font-size: 0.65em;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 6px;
            opacity: 0.75;
            background: rgba(255,255,255,0.15);
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 4px;
            font-size: 1.2em;
            line-height: 1;
            letter-spacing: 0;
            text-transform: none;
            font-weight: 400;
            transition: color 0.15s;
        }
        .delete-btn:hover { color: #f87171; opacity: 1; transform: none; }

        .edit-btn {
            position: absolute;
            top: 8px;
            right: 34px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 4px;
            font-size: 0.95em;
            line-height: 1;
            letter-spacing: 0;
            text-transform: none;
            font-weight: 400;
            transition: color 0.15s;
        }
        .edit-btn:hover { color: #60a5fa; opacity: 1; transform: none; }

        /* ── Edit Modal ──────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 28px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: modalIn 0.18s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.94); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal h3 {
            margin: 0 0 20px;
            font-size: 1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #60a5fa;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, #1d4ed8, #60a5fa);
            color: white;
            box-shadow: 0 4px 15px rgba(96,165,250,0.3);
        }

        .btn-cancel {
            background: rgba(255,255,255,0.08);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* ── Empty state ─────────────────────────── */
        .empty-hint {
            text-align: center;
            font-size: 0.82em;
            color: rgba(255,255,255,0.2);
            margin-top: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>🎴 Card Database</h1>

    <div class="form-container">
        <h3>Add New Card</h3>
        <div class="form-row">
            <input type="text" id="cardName" placeholder="Card name…" required>
            <select id="cardType">
                <option value="defensive">⚔️ Defensive</option>
                <option value="offensive">🔥 Offensive</option>
                <option value="other">🌀 Other</option>
                <option value="special">⭐ Special</option>
            </select>
        </div>
        <textarea id="cardDesc" placeholder="Description of the card's ability…"></textarea>
        <div class="btn-row">
            <button class="btn-add" onclick="addCard()">+ Add Card</button>
            <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>✏️ Edit Card</h3>
            <input type="text" id="editName" placeholder="Card name…">
            <div class="form-row">
                <select id="editType">
                    <option value="defensive">⚔️ Defensive</option>
                    <option value="offensive">🔥 Offensive</option>
                    <option value="other">🌀 Other</option>
                    <option value="special">⭐ Special</option>
                </select>
            </div>
            <textarea id="editDesc" placeholder="Description…"></textarea>
            <div class="modal-btns">
                <button class="btn-save" onclick="saveEdit()">Save Changes</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="column" id="col-defensive" ondragover="onDragOver(event)" ondrop="onDrop(event,'defensive')" ondragleave="onDragLeave(event)">
            <h2>⚔️ Defensive <span id="count-defensive" class="counter">0</span></h2>
            <div id="list-defensive"></div>
        </div>

        <div class="column" id="col-offensive" ondragover="onDragOver(event)" ondrop="onDrop(event,'offensive')" ondragleave="onDragLeave(event)">
            <h2>🔥 Offensive <span id="count-offensive" class="counter">0</span></h2>
            <div id="list-offensive"></div>
        </div>

        <div class="column" id="col-other" ondragover="onDragOver(event)" ondrop="onDrop(event,'other')" ondragleave="onDragLeave(event)">
            <h2>🌀 Other <span id="count-other" class="counter">0</span></h2>
            <div id="list-other"></div>
        </div>

        <div class="column" id="col-special" ondragover="onDragOver(event)" ondrop="onDrop(event,'special')" ondragleave="onDragLeave(event)">
            <h2>⭐ Special <span id="count-special" class="counter">0</span></h2>
            <div id="list-special"></div>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('gameCards')) || [];
        let draggedId = null;

        renderCards();

        /* ── Add Card ──────────────────────────────── */
        function addCard() {
            const name = document.getElementById('cardName').value.trim();
            const type = document.getElementById('cardType').value;
            const desc = document.getElementById('cardDesc').value.trim();

            if (!name) return alert('Please enter a card name!');

            cards.push({ id: Date.now(), name, type, desc });
            saveAndRefresh();

            document.getElementById('cardName').value = '';
            document.getElementById('cardDesc').value = '';
        }

        /* ── Delete Card ───────────────────────────── */
        function deleteCard(id) {
            cards = cards.filter(c => c.id !== id);
            saveAndRefresh();
        }

        /* ── Drag & Drop ───────────────────────────── */
        function onDragStart(e, id) {
            draggedId = id;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => {
                const el = document.querySelector(`[data-id="${id}"]`);
                if (el) el.classList.add('dragging');
            }, 0);
        }

        function onDragEnd(e) {
            document.querySelectorAll('.card-item').forEach(el => el.classList.remove('dragging'));
            document.querySelectorAll('.column').forEach(el => el.classList.remove('drag-over'));
        }

        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const col = e.currentTarget;
            col.classList.add('drag-over');
        }

        function onDragLeave(e) {
            if (!e.currentTarget.contains(e.relatedTarget)) {
                e.currentTarget.classList.remove('drag-over');
            }
        }

        function onDrop(e, newType) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (draggedId === null) return;
            const card = cards.find(c => c.id === draggedId);
            if (card && card.type !== newType) {
                card.type = newType;
                saveAndRefresh();
            }
            draggedId = null;
        }

        /* ── Export CSV ────────────────────────────── */
        function exportCSV() {
            if (cards.length === 0) return alert('No cards to export!');
            const header = ['ID', 'Name', 'Type', 'Description'];
            const rows = cards.map(c => [
                c.id,
                `"${c.name.replace(/"/g, '""')}"`,
                c.type,
                `"${(c.desc || '').replace(/"/g, '""')}"`
            ]);
            const csv = [header, ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'card_database.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        /* ── Save & Render ─────────────────────────── */
        function saveAndRefresh() {
            localStorage.setItem('gameCards', JSON.stringify(cards));
            renderCards();
        }

        const TYPES = ['defensive', 'offensive', 'other', 'special'];
        const LABELS = { defensive: 'Defensive', offensive: 'Offensive', other: 'Other', special: 'Special' };

        function renderCards() {
            const lists = {};
            const counts = {};
            TYPES.forEach(t => {
                lists[t] = document.getElementById(`list-${t}`);
                lists[t].innerHTML = '';
                counts[t] = 0;
            });

            cards.forEach(card => {
                if (!lists[card.type]) return;
                const el = document.createElement('div');
                el.className = `card-item ${card.type}`;
                el.setAttribute('draggable', 'true');
                el.setAttribute('data-id', card.id);
                el.innerHTML = `
                    <button class="delete-btn" onclick="deleteCard(${card.id})" title="Delete">×</button>
                    <button class="edit-btn" onclick="openEditModal(${card.id})" title="Edit">✏️</button>
                    <span class="card-badge">${LABELS[card.type] || card.type}</span>
                    <span class="card-name">${escHtml(card.name)}</span>
                    ${card.desc ? `<div class="card-desc">${escHtml(card.desc)}</div>` : ''}
                `;
                el.addEventListener('dragstart', e => onDragStart(e, card.id));
                el.addEventListener('dragend', onDragEnd);
                lists[card.type].appendChild(el);
                counts[card.type]++;
            });

            TYPES.forEach(t => {
                document.getElementById(`count-${t}`).innerText = counts[t];
                if (counts[t] === 0) {
                    const hint = document.createElement('p');
                    hint.className = 'empty-hint';
                    hint.textContent = 'Drop cards here';
                    lists[t].appendChild(hint);
                }
            });
        }

        /* ── Edit Card ─────────────────────────────── */
        let editingId = null;

        function openEditModal(id) {
            const card = cards.find(c => c.id === id);
            if (!card) return;
            editingId = id;
            document.getElementById('editName').value = card.name;
            document.getElementById('editType').value = card.type;
            document.getElementById('editDesc').value = card.desc || '';
            document.getElementById('editModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('open');
            editingId = null;
        }

        function saveEdit() {
            const name = document.getElementById('editName').value.trim();
            if (!name) return alert('Card name cannot be empty!');
            const card = cards.find(c => c.id === editingId);
            if (!card) return;
            card.name = name;
            card.type = document.getElementById('editType').value;
            card.desc = document.getElementById('editDesc').value.trim();
            closeModal();
            saveAndRefresh();
        }

        // Close modal on overlay click
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close modal on Escape
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
