<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pla d'Estudi — Accés +25 anys</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <h1>Pla d'Estudi — 6 Mesos</h1>
    <div class="subtitle">Proves d'accés a la universitat · Majors de 25 anys · Matemàtiques & Física</div>
    <div class="hero-stats">
      <div class="hero-stat"><span class="val">6</span><span class="lbl">Mesos</span></div>
      <div class="hero-stat"><span class="val">33</span><span class="lbl">Temes</span></div>
      <div class="hero-stat"><span class="val">Març '26</span><span class="lbl">Inici</span></div>
      <div class="hero-stat"><span class="val">Set. '26</span><span class="lbl">Objectiu</span></div>
    </div>
    <div class="countdown-wrap">
      <span class="cd-label">Falten</span>
      <span class="cd-val" id="countdown">—</span>
      <span class="cd-label">dies</span>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-card">
    <span class="label">Progrés total</span>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="globalBar"></div></div>
    <span class="progress-pct" id="globalPct">0%</span>
  </div>
</div>

<div class="nav-wrap">
  <div class="nav-tabs" id="navTabs"></div>
</div>

<div class="main" id="mainContent"></div>

<script src="app.js"></script>
</body>
</html>
